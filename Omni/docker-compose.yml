version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8080"
    env_file:
      - ./config/.env
    environment:
      - GOOGLE_CLOUD_PROJECT=project-017f83aa-1166-4bbf-aae
      - GOOGLE_CLOUD_LOCATION=us-central1
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
